<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aço Naval — Solicitações</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#f5f7fa;color:#222;min-height:100vh}
.topo{background:#003366;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.topo h1{color:#fff;font-size:18px;font-weight:600}
.topo .sub{color:#85B7EB;font-size:13px;margin-top:2px}
.container{max-width:860px;margin:24px auto;padding:0 16px}
.card{background:#fff;border:1px solid #e0e4e8;border-radius:10px;padding:16px 20px;margin-bottom:16px}
.empty{color:#999;font-size:13px;text-align:center;padding:40px 0;font-style:italic}
.loading{text-align:center;padding:60px 20px;color:#666}
.loading .spinner{width:40px;height:40px;border:3px solid #e0e4e8;border-top-color:#185FA5;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{font-size:13px;padding:7px 14px;border-radius:6px;border:1px solid #d0d4d8;background:#fff;color:#222;cursor:pointer;font-weight:500}
.btn:hover{background:#f5f7fa}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-verde{background:#3B6D11;color:#fff;border-color:#3B6D11}
.btn-verde:hover{background:#2a4f0c}
.sol-card{background:#fff;border:1px solid #e0e4e8;border-radius:10px;padding:16px 18px;margin-bottom:12px;border-left:4px solid #EF9F27}
.sol-card.respondido{border-left-color:#63b922;opacity:0.8}
.sol-num{font-size:18px;font-weight:700;color:#003366}
.sol-pedido{font-size:14px;font-weight:600}
.sol-meta{font-size:12px;color:#888;margin:4px 0 10px}
.sol-texto{font-size:14px;color:#333;line-height:1.6;background:#f9f9f9;border-radius:6px;padding:10px 14px;margin-bottom:12px}
.sol-resp{font-size:13px;color:#3B6D11;background:#EAF3DE;border-radius:6px;padding:10px 14px;margin-bottom:12px;line-height:1.5}
.badge-tipo{font-size:11px;padding:3px 10px;border-radius:20px;background:#f0f2f5;color:#555;font-weight:600;display:inline-block;margin-left:6px}
.badge-pend{background:#FFF4E0;color:#854F0B;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.badge-resp{background:#EAF3DE;color:#3B6D11;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.filtros{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filtros label{font-size:13px;color:#666;font-weight:500}
select{font-size:13px;padding:7px 10px;border:1px solid #d0d4d8;border-radius:6px;background:#fff;color:#222}
textarea{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid #d0d4d8;border-radius:6px;width:100%;resize:vertical;line-height:1.5}
textarea:focus{outline:none;border-color:#185FA5;box-shadow:0 0 0 2px rgba(24,95,165,0.15)}
.contador{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.cnt-box{background:#fff;border:1px solid #e0e4e8;border-radius:8px;padding:12px 18px;flex:1;min-width:120px;text-align:center}
.cnt-box .v{font-size:26px;font-weight:700}
.cnt-box .l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.3px;margin-top:2px}
.sync-badge{font-size:12px;color:#3B6D11;background:#EAF3DE;padding:4px 12px;border-radius:20px;font-weight:600}
@media(max-width:600px){.container{padding:0 10px}}
</style>
</head>
<body>

<div class="topo">
  <div>
    <h1>AÇO NAVAL — Solicitações</h1>
    <div class="sub">Portal da secretaria</div>
  </div>
  <span class="sync-badge" id="sync-status">⟳ Conectando...</span>
</div>

<div class="container">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Carregando solicitações...</p>
  </div>

  <div id="conteudo" style="display:none">
    <div class="contador">
      <div class="cnt-box"><div class="v" id="cnt-pend" style="color:#854F0B">0</div><div class="l">⏳ Pendentes</div></div>
      <div class="cnt-box"><div class="v" id="cnt-resp" style="color:#3B6D11">0</div><div class="l">✅ Respondidas</div></div>
      <div class="cnt-box"><div class="v" id="cnt-total" style="color:#185FA5">0</div><div class="l">Total</div></div>
    </div>

    <div class="filtros">
      <label>Mostrar:</label>
      <select id="f-status" onchange="renderLista()">
        <option value="pendente">⏳ Pendentes</option>
        <option value="">Todas</option>
        <option value="respondido">✅ Respondidas</option>
      </select>
    </div>

    <div id="lista"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAb46YPuZDtuGitlySCxKXJjy0WEy0xPMI",
  authDomain: "aco-naval-gestao.firebaseapp.com",
  databaseURL: "https://aco-naval-gestao-default-rtdb.firebaseio.com",
  projectId: "aco-naval-gestao",
  storageBucket: "aco-naval-gestao.firebasestorage.app",
  messagingSenderId: "359027216116",
  appId: "1:359027216116:web:af8df148f57e7c3fb398a1"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const REF=db.ref('dados');

let sols=[];
let dadosCompletos={};  // guarda o objeto completo do Firebase para não perder outros dados ao salvar

// Status de conexão
db.ref('.info/connected').on('value',snap=>{
  const el=document.getElementById('sync-status');
  if(snap.val()){el.textContent='🟢 Online';el.style.background='#EAF3DE';el.style.color='#3B6D11';}
  else{el.textContent='🔴 Sem conexão';el.style.background='#FCEAEA';el.style.color='#A32D2D';}
});

// Escuta em tempo real
REF.on('value',snap=>{
  const d=snap.val()||{};
  dadosCompletos=d;
  sols=d.sols||[];
  document.getElementById('loading').style.display='none';
  document.getElementById('conteudo').style.display='block';
  renderLista();
});

function salvarSols(){
  dadosCompletos.sols=sols;
  REF.set(dadosCompletos)
    .then(()=>{
      const el=document.getElementById('sync-status');
      el.textContent='✓ Salvo';
      setTimeout(()=>el.textContent='🟢 Online',1500);
    })
    .catch(e=>alert('Erro ao salvar: '+e.message));
}

function renderLista(){
  const fSt=document.getElementById('f-status').value;
  const nPend=sols.filter(s=>s.status==='pendente').length;
  const nResp=sols.filter(s=>s.status==='respondido').length;
  document.getElementById('cnt-pend').textContent=nPend;
  document.getElementById('cnt-resp').textContent=nResp;
  document.getElementById('cnt-total').textContent=sols.length;

  let lista=fSt?sols.filter(s=>s.status===fSt):[...sols];
  lista.sort((a,b)=>{
    if(a.status===b.status)return b.id-a.id;
    return a.status==='pendente'?-1:1;
  });

  const el=document.getElementById('lista');
  if(!lista.length){
    el.innerHTML='<p class="empty">'+(fSt==='pendente'?'Nenhuma solicitação pendente 🎉 Tudo em dia!':'Nenhuma solicitação encontrada.')+'</p>';
    return;
  }

  let h='';
  lista.forEach(s=>{
    h+='<div class="sol-card '+s.status+'">';

    // Cabeçalho
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:6px">';
    h+='<div>';
    h+='<span class="sol-num">SOL-'+(s.numSol||'???')+'</span>';
    h+='<span class="badge-tipo">'+s.tipo+'</span> ';
    h+=(s.status==='pendente'?'<span class="badge-pend">⏳ Pendente</span>':'<span class="badge-resp">✅ Respondida</span>');
    h+='</div>';
    h+='</div>';

    // Info do pedido
    h+='<div class="sol-pedido">Pedido Nº '+s.numPedido+(s.cidade?' — '+s.cidade+' / '+s.uf:'')+'</div>';
    h+='<div class="sol-meta">📅 Criada em: '+s.data+(s.dataResp?' &nbsp;|&nbsp; ✅ Respondida em: '+s.dataResp:'')+'</div>';

    // Solicitação
    h+='<div style="font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px">Solicitação:</div>';
    h+='<div class="sol-texto">'+s.texto+'</div>';

    // Resposta já registrada
    if(s.resposta){
      h+='<div style="font-size:11px;color:#3B6D11;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px">Resposta registrada:</div>';
      h+='<div class="sol-resp">'+s.resposta+'</div>';
    }

    // Campo de resposta
    if(s.status==='pendente'){
      h+='<div style="font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px">Sua resposta:</div>';
      h+='<textarea id="r-'+s.id+'" rows="3" placeholder="Digite a resposta para o cliente...">'+(s.resposta||'')+'</textarea>';
      h+='<div style="display:flex;gap:8px;margin-top:8px">';
      h+='<button class="btn btn-verde" onclick="responder('+s.id+')">✅ Salvar e marcar como respondida</button>';
      h+='<button class="btn" onclick="salvarRascunho('+s.id+')">💾 Salvar rascunho</button>';
      h+='</div>';
    } else {
      // Respondida — opção de editar ou reabrir
      h+='<div style="display:flex;gap:8px;margin-top:8px">';
      h+='<button class="btn" onclick="reabrir('+s.id+')">↩️ Reabrir</button>';
      h+='</div>';
    }
    h+='</div>';
  });
  el.innerHTML=h;
}

function responder(id){
  const val=document.getElementById('r-'+id).value.trim();
  if(!val){alert('Escreva a resposta antes de marcar como respondida.');return;}
  const s=sols.find(x=>x.id===id);if(!s)return;
  s.resposta=val;
  s.status='respondido';
  if(!s.dataResp){
    const agora=new Date();
    s.dataResp=agora.toLocaleDateString('pt-BR')+' '+agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  salvarSols();
}

function salvarRascunho(id){
  const val=document.getElementById('r-'+id).value.trim();
  const s=sols.find(x=>x.id===id);if(!s)return;
  s.resposta=val;
  salvarSols();
  alert('Rascunho salvo!');
}

function reabrir(id){
  const s=sols.find(x=>x.id===id);if(!s)return;
  s.status='pendente';
  s.dataResp='';
  salvarSols();
}
</script>
</body>
</html>
